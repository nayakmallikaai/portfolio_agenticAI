apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-app
  template:
    metadata:
      labels:
        app: portfolio-app
    spec:
      containers:
        - name: portfolio-app
          # setup.sh replaces the placeholder below with the real ECR URL
          image: 921772462914.dkr.ecr.ap-south-1.amazonaws.com/portfolio-app:f65439b
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: DATABASE_URL
              value: postgresql://portfolio_user:$(POSTGRES_PASSWORD)@postgres:5432/portfolio_db
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: anthropic-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: openai-api-key
            - name: LANGCHAIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: langchain-api-key
            - name: LANGCHAIN_PROJECT
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: langchain-project
            - name: LANGCHAIN_TRACING_V2
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: langchain-tracing
            - name: LANGCHAIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: langchain-endpoint
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-app-service
spec:
  type: LoadBalancer          # provisions an AWS ELB; hostname used in smoke test
  selector:
    app: portfolio-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
